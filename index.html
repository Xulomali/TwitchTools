<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Twitch Tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Material+Icons&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#0f0f14; --card:#181825; --primary:#9146FF; --text:#e5e7eb; --muted:#9ca3af; --radius:18px; }
    *{box-sizing:border-box;}
    body{margin:0;font-family:'Inter',system-ui,sans-serif;background:radial-gradient(1200px 600px at 10% -10%,#1f1147,transparent),var(--bg);color:var(--text);}
    header{padding:3rem 1.5rem;text-align:center;}
    header h1{font-size:clamp(2.5rem,5vw,4rem);margin-bottom:.5rem;display:flex;align-items:center;justify-content:center;gap:.75rem;}
    header p{color:var(--muted);max-width:600px;margin:0 auto;padding-left:25px;}
    main{max-width:1200px;margin:0 auto;padding:1.5rem;}
    .category{margin-bottom:3rem;}
    .category h2{font-size:1.6rem;margin-bottom:1rem;border-left:4px solid var(--primary);padding-left:.75rem;cursor:pointer;}
    .category-content{display:grid;grid-template-columns:repeat(2,minmax(260px,1fr));gap:1.5rem;}
    .category-content.hidden{display:none;}
    @media(max-width:768px){.category-content{grid-template-columns:1fr;}}
    .card{background:linear-gradient(180deg,rgba(255,255,255,0.03),transparent),var(--card);border-radius:var(--radius);padding:1rem;display:flex;flex-direction:column;gap:.75rem;box-shadow:0 10px 30px rgba(0,0,0,.35);transition:transform .2s ease,box-shadow .2s ease;}
    .card:hover{transform:translateY(-4px);box-shadow:0 20px 40px rgba(0,0,0,.45);}
    .card-header{display:flex;align-items:center;gap:.75rem;}
    .icon{width:48px;height:48px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:rgba(255,255,255,0.08);font-weight:700;color:white;}
    .icon img{width:100%;height:100%;object-fit:cover;}
    .card h3{margin:0;font-size:1.1rem;}
    .card p{color:var(--muted);font-size:.95rem;line-height:1.5;flex-grow:1;}
    .card-actions{display:flex;gap:.5rem;}
    .btn{text-decoration:none;background:var(--primary);color:white;display:inline-flex;align-items:center;gap:.4rem;justify-content:center;padding:.45rem .7rem;border-radius:12px;font-weight:600;cursor:pointer;border:none;}
    footer{text-align:center;padding:2rem 1rem;color:var(--muted);font-size:.9rem;}
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center;z-index:1000;}
    .modal{background:var(--card);padding:2rem;border-radius:var(--radius);max-width:900px;width:95%;position:relative;display:flex;flex-direction:column;max-height:90vh;overflow-y:auto;}
    .modal-top{display:flex;align-items:center;gap:1rem;}
    .modal-icon{width:72px;height:72px;border-radius:50%;overflow:hidden;background:rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:700;}
    .modal-icon img{width:100%;height:100%;object-fit:cover;}
    .modal-title{flex-grow:1;font-size:1.8rem;font-weight:700;}
    .modal-button{background:var(--primary);color:white;padding:.5rem 1rem;border-radius:12px;cursor:pointer;font-weight:600;display:inline-flex;align-items:center;gap:.4rem;}
    .modal-body{display:flex;margin-top:1rem;gap:1.5rem;}
    .modal-left{width:220px;font-size:.85rem;color:var(--muted);padding-top:1.5rem;padding-right:25px;}
    .modal-right{flex-grow:1;text-align:justify;}
    .close{position:absolute;top:.5rem;right:1rem;cursor:pointer;font-size:1.5rem;}
    @media(max-width:768px){.modal-body{flex-direction:column;}.modal-left{width:100%;padding-right:0;}}
  </style>
</head>
<body>

<header>
  <h1><img src="data:image/svg+xml,%3Csvg%20width%3D%2260px%22%20height%3D%2260px%22%20viewBox%3D%220%200%2040%2040%22%20xmlns%3D%22http://www.w3.org/2000/svg%22%3E%3Cg%20fill%3D%22none%22%3E%3Cpolygon%20points%3D%2216%205%208%2013%208%2031%2014%2031%2014%2036%2019%2031%2023%2031%2035%2019%2035%205%22%20fill%3D%22%23A970FF%22/%3E%3Cpolygon%20points%3D%2226%2025%2030%2021%2030%2010%2014%2010%2014%2025%2018%2025%2018%2029%2022%2025%22%20fill%3D%22%23FFFFFF%22/%3E%3Crect%20x%3D%2220%22%20y%3D%2214%22%20width%3D%222%22%20height%3D%226%22%20fill%3D%22%23A970FF%22/%3E%3Crect%20x%3D%2225%22%20y%3D%2214%22%20width%3D%222%22%20height%3D%226%22%20fill%3D%22%23A970FF%22/%3E%3C/g%3E%3C/svg%3E" alt="Logo"/> Twitch Tools</h1>
  <p>Una colección de herramientas útiles para streamers de Twitch: bots, overlays, widgets y más.</p>
</header>

<main id="main"></main>

<footer>© 2026 · Twitch Tools</footer>

<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <span class="close" id="modal-close">×</span>
    <div class="modal-top">
      <div class="modal-icon" id="modal-icon"></div>
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-button" id="modal-open"><span class="material-icons">open_in_new</span> Abrir</div>
    </div>
    <div class="modal-body">
      <div class="modal-left" id="modal-extra" style="display:none;"></div>
      <div class="modal-right" id="modal-desc"></div>
    </div>
  </div>
</div>

<div class="modal-bg" id="nested-modal-bg">
  <div class="modal">
    <span class="close" id="nested-modal-close">×</span>
    <div class="modal-top">
      <div class="modal-icon" id="nested-modal-icon"></div>
      <div class="modal-title" id="nested-modal-title"></div>
      <div class="modal-button" id="nested-modal-open"><span class="material-icons">open_in_new</span> Abrir</div>
    </div>
    <div class="modal-body">
      <div class="modal-left" id="nested-modal-extra"></div>
      <div class="modal-right" id="nested-modal-desc"></div>
    </div>
  </div>
</div>

<script>
const categories=[
  {
  	name:'StreamElements',
  	popup:true,
  	tools:[
  	{ //StreamElements Subathon
  		name:'Subathon Widget',
  		desc:'Widget oficial de StreamElements para subathons.',
  		fullDesc:'El Subathon Widget de StreamElements permite crear eventos de subathon totalmente personalizables, con temporizador dinámico que se incrementa con subs, bits y donaciones.',
  		img:'https://widgets.streamelements.com/element/subathon-widget/preview.png',
  		creator:'StreamElements',url:'https://widgets.streamelements.com/element/subathon-widget',
  		showInMain:true}]
  	},

  {
  name: 'Bots & Moderación',
  popup:false,
  tools: [
    {
      name: 'Bot de Chat',
      desc: 'Automatiza tareas de moderación y comandos.',
      fullDesc: 'Bot de chat avanzado para Twitch que permite configurar comandos personalizados, respuestas automáticas, moderación de spam, filtrado de palabras y estadísticas de chat en tiempo real.',
      img: 'https://via.placeholder.com/64?text=Bot',
      creator: 'StreamerTools Inc.',
      url: 'https://example.com/chat-bot',
      showInMain: true
    },
    {
      name: 'Protector',
      desc: 'Evita spam y usuarios problemáticos.',
      fullDesc: 'Herramienta de protección que detecta y bloquea automáticamente usuarios problemáticos, spammers y trolls, manteniendo tu chat seguro y limpio.',
      img: 'https://via.placeholder.com/64?text=Protector',
      creator: 'SafeChat Co.',
      url: 'https://example.com/protector',
      showInMain: true,
      hidden: true
    }]
   },


   {
  	name:'Overlays & Diseño',
  	popup:true,
  	tools:[
  	{ //Iros Overlay
  		name:'Iros Overlay',
  		desc:'Overlays reactivos y widgets avanzados.',
  		fullDesc:'Iros ofrece overlays altamente personalizables y reactivos para Twitch.',
  		img:'https://t1.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=https://iros.vrsal.cc&size=64',
  		creator:'VRSAL',
  		url:'https://iros.vrsal.cc',
  		showInMain:true}]
  	},
  
  {
  	name:'Compartir Archivos',
  	tools:[
  	{ //Kappa.lol
  		name:'kappa.lol',
  		desc:'Comparte imágenes de hasta 100MB temporalmente.',
  		fullDesc:'Servicio rápido para subir y compartir imágenes mediante enlaces temporales.',
  		img:'https://t1.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=https://kappa.lol/&size=64',
  		creator:'kappa.lol',
  		url:'https://kappa.lol/',
  		showInMain:true}]
  	}
];

const main=document.getElementById('main');
const modalBg=document.getElementById('modal-bg');
const modalIcon=document.getElementById('modal-icon');
const modalTitle=document.getElementById('modal-title');
const modalDesc=document.getElementById('modal-desc');
const modalExtra=document.getElementById('modal-extra');
const modalOpen=document.getElementById('modal-open');
const nestedBg=document.getElementById('nested-modal-bg');
const nestedIcon=document.getElementById('nested-modal-icon');
const nestedTitle=document.getElementById('nested-modal-title');
const nestedDesc=document.getElementById('nested-modal-desc');
const nestedExtra=document.getElementById('nested-modal-extra');
const nestedOpen=document.getElementById('nested-modal-open');

function letterIcon(name){return name.charAt(0).toUpperCase();}
function disableBodyScroll(){document.body.style.overflow='hidden';}
function enableBodyScroll(){document.body.style.overflow='';}

function openToolModal(tool){
  modalTitle.textContent=tool.name;
  modalDesc.textContent=tool.fullDesc;
  modalExtra.style.display='block';
  modalExtra.textContent='Creador: '+(tool.creator||'Desconocido');
  modalOpen.style.display='inline-flex';
  modalOpen.onclick=()=>window.open(tool.url,'_blank');
  modalIcon.innerHTML=tool.img?`<img src="${tool.img}" onerror="this.remove(); modalIcon.textContent='${letterIcon(tool.name)}'">`:letterIcon(tool.name);
  modalBg.style.display='flex';
  disableBodyScroll();
}

function openNestedToolModal(tool){
  nestedTitle.textContent=tool.name;
  nestedDesc.textContent=tool.fullDesc;
  nestedExtra.style.display='block';
  nestedExtra.textContent='Creador: '+(tool.creator||'Desconocido');
  nestedOpen.style.display='inline-flex';
  nestedOpen.onclick=()=>window.open(tool.url,'_blank');
  nestedIcon.innerHTML=tool.img?`<img src="${tool.img}" onerror="this.remove(); nestedIcon.textContent='${letterIcon(tool.name)}'">`:letterIcon(tool.name);
  nestedBg.style.display='flex';
}

function openCategoryModal(category){
  modalTitle.textContent=category.name;
  modalDesc.innerHTML='';
  modalExtra.style.display='none';
  modalOpen.style.display='none';
  modalIcon.textContent=category.name.charAt(0);

  category.tools.forEach(tool=>{
  	if (tool.hidden === true) return;

    const subTitle=document.createElement('h3');
    subTitle.textContent='Widgets';
    subTitle.style.margin='1rem 0 0.5rem 0';
    subTitle.style.fontSize='1.1rem';
    subTitle.style.color='var(--muted)';

    const list=document.createElement('div');
    list.className='category-content';

    const card=document.createElement('div');
    card.className='card';
    const iconContent=tool.img?`<img src="${tool.img}" onerror="this.parentNode.textContent='${letterIcon(tool.name)}'">`:letterIcon(tool.name);
    card.innerHTML=`<div class="card-header"><div class="icon">${iconContent}</div><h3>${tool.name}</h3></div><p>${tool.desc}</p><div class="card-actions"><button class="btn"><span class="material-icons">visibility</span> Ver más</button></div>`;
    card.querySelector('.btn').onclick=()=>openNestedToolModal(tool);
    list.appendChild(card);

    modalDesc.appendChild(subTitle);
    modalDesc.appendChild(list);
  });

  modalBg.style.display='flex';
  disableBodyScroll();
}

categories.forEach(cat=>{
  const section=document.createElement('section');
  section.className='category';
  const h2=document.createElement('h2');
  h2.textContent=cat.name;
  section.appendChild(h2);

  const grid=document.createElement('div');
  grid.className='category-content';

  cat.tools.forEach(tool=>{
  	if (tool.hidden === true) return;

    if(tool.showInMain){
      const card=document.createElement('div');
      card.className='card';
      const iconContent=tool.img?`<img src="${tool.img}" onerror="this.parentNode.textContent='${letterIcon(tool.name)}'">`:letterIcon(tool.name);
      card.innerHTML=`<div class="card-header"><div class="icon">${iconContent}</div><h3>${tool.name}</h3></div><p>${tool.desc}</p><div class="card-actions"><button class="btn"><span class="material-icons">visibility</span> Ver más</button></div>`;
      card.querySelector('.btn').onclick=()=>openToolModal(tool);
      grid.appendChild(card);
    }
  });

  section.appendChild(grid);
  main.appendChild(section);
  if(!cat.popup) h2.onclick=()=>grid.classList.toggle('hidden'); else h2.onclick=()=>openCategoryModal(cat);
});

document.getElementById('modal-close').onclick=()=>{modalBg.style.display='none'; enableBodyScroll();};
document.getElementById('nested-modal-close').onclick=()=>{nestedBg.style.display='none';};

// Close modals by clicking outside
modalBg.addEventListener('click',e=>{if(e.target===modalBg){modalBg.style.display='none'; enableBodyScroll();}});
nestedBg.addEventListener('click',e=>{if(e.target===nestedBg){nestedBg.style.display='none';}});
</script>

</body>
</html>
